<!DOCTYPE html>
<html>
<head><title>Alpha One Index Logo Generator</title></head>
<body style="margin:0;background:#0d1117;display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh">
<canvas id="c" width="500" height="500" style="border:1px solid #333"></canvas>
<br>
<a id="dl" style="color:white;font-size:18px;background:#00d4ff;padding:12px 24px;border-radius:8px;text-decoration:none;margin-top:20px;cursor:pointer">Download PNG</a>
<script>
const c = document.getElementById('c');
const x = c.getContext('2d');
// Background
x.fillStyle = '#0d1117';
x.fillRect(0, 0, 500, 500);
// Radial glow
const g = x.createRadialGradient(250, 250, 0, 250, 250, 200);
g.addColorStop(0, 'rgba(0,212,255,0.25)');
g.addColorStop(0.7, 'rgba(0,212,255,0.03)');
g.addColorStop(1, 'rgba(0,212,255,0)');
x.fillStyle = g;
x.fillRect(0, 0, 500, 500);
// Outer ring
x.strokeStyle = 'rgba(0,212,255,0.5)';
x.lineWidth = 2;
x.beginPath();
x.arc(250, 250, 170, 0, Math.PI * 2);
x.stroke();
// Inner ring
x.strokeStyle = 'rgba(0,212,255,0.25)';
x.lineWidth = 0.5;
x.beginPath();
x.arc(250, 250, 165, 0, Math.PI * 2);
x.stroke();
// Letter A - centered
x.fillStyle = '#e8f4f8';
x.font = '300 200px Helvetica Neue, Arial, sans-serif';
x.textAlign = 'center';
x.textBaseline = 'middle';
x.fillText('A', 250, 258);
// Glow effect
x.fillStyle = 'rgba(0,212,255,0.1)';
x.fillText('A', 250, 258);
// Download link
const dl = document.getElementById('dl');
dl.href = c.toDataURL('image/png');
dl.download = 'alpha-one-index-logo.png';
</script>
</body>
</html>
