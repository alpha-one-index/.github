name: Update Profile Avatar

on:
  workflow_dispatch:

jobs:
  update-avatar:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install Pillow

      - name: Generate centered logo PNG
        run: |
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont

          size = 500
          img = Image.new('RGB', (size, size), (13, 17, 23))
          draw = ImageDraw.Draw(img, 'RGBA')

          # Radial glow - brighter
          for r in range(200, 0, -1):
              alpha = int(100 * (1 - r/200) ** 2)
              color = (0, 212, 255, alpha)
              x0, y0 = 250 - r, 250 - r
              x1, y1 = 250 + r, 250 + r
              draw.ellipse([x0, y0, x1, y1], fill=color)

          # Outer ring - brighter
          draw.ellipse([80, 80, 420, 420], outline=(0, 212, 255, 200), width=2)
          # Inner ring
          draw.ellipse([85, 85, 415, 415], outline=(0, 212, 255, 100), width=1)

          # Letter A - centered
          try:
              font = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans-Light.ttf', 180)
          except:
              font = ImageFont.load_default()

          bbox = draw.textbbox((0, 0), 'A', font=font)
          tw = bbox[2] - bbox[0]
          th = bbox[3] - bbox[1]
          tx = (size - tw) / 2 - bbox[0]
          ty = (size - th) / 2 - bbox[1]

          # Glow behind text
          for offset in range(3, 0, -1):
              draw.text((tx, ty), 'A', fill=(0, 212, 255, 40), font=font)

          # Main text - bright white
          draw.text((tx, ty), 'A', fill=(232, 244, 248, 255), font=font)

          img = img.convert('RGB')
          img.save('avatar.png')
          print('Avatar generated: 500x500 centered RGB')
          PYEOF

      - name: Upload avatar artifact
        uses: actions/upload-artifact@v4
        with:
          name: centered-avatar
          path: avatar.png
